pre-commit:
    piped: true
    commands:
        fmt:
            run: deno fmt --check {staged_files}
            glob: "*.{ts,js,md,json}"
            exclude: "samples/"
        lint:
            run: test -n "{staged_files}" && deno lint {staged_files} || true
            glob: "*.{ts,js}"
            exclude: "samples/"
        test:
            run: scripts/check_coverage.sh
